<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="UTF-8">
		<title>DIALOG & PASSWORD</title>
	</head>
	<body>

		<div class="main-box">
			<h2>ざわっざわっ</h2>
			<p>現在はログアウト状態です</p>
			<button id="open-dialog-btn" class="btn-primary">
				ログインダイアログを開く
			</button>
		</div>

		<dialog id="auth-dialog">
			<h3>きみはむきむき、きむはみきみき</h3>
			<p>パスワードを入力せよ</p>
			<div class="input-container">
				<input type="password" id="password-input" class="input-field" placeholder="何かしろ">
				<button type="button" id="toggle-btn" class="toggle-password">目</button>
			</div>

			<div class="dialog-actions">
				<button id="close-dialog-btn" class="btn-secondary">キャンセル</button>
				<button id="save-btn" class="btn-primary">確定</button>
			</div>
		</dialog>

		<script>
			const dialog = document.getElementById('auth-dialog');
			const openBtn = document.getElementById('open-dialog-btn');
			const closeBtn = document.getElementById('close-dialog-btn');
			const saveBtn = document.getElementById('save-btn');
			const passwordInput = document.getElementById('password-input');
			const toggleBtn = document.getElementById('toggle-btn');

			openBtn.addEventListener('click', () => { dialog.showModal(); });
			closeBtn.addEventListener('click', () => {
				dialog.close();
			});
			saveBtn.addEventListener('click', () => {
				alert('入力したのは: ' + passwordInput.value);
				dialog.close();
			});

			toggleBtn.addEventListener('click', () => {
				if (passwordInput.type == 'password') {
					passwordInput.type = 'text';
					toggleBtn.textContent = '家';
				} else {
					passwordInput.type = 'password';
					toggleBtn.textContent = '目'
				}
			})


		</script>

	</body>
</html>
